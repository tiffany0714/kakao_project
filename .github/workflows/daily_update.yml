name: Automated Ozkiz Ranking Update

on:
  schedule:
    # 한국 시간 오후 12시는 UTC 기준 오전 3시입니다.
    - cron: '0 3 * * *'
  workflow_dispatch: # 관리자가 원할 때 언제든 'Run workflow' 버튼으로 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas playwright openpyxl
          playwright install chromium

      - name: Run Scraper
        run: python backend/scraper.py
      
      - name: Push updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/current_data.json
          git commit -m "Automated Update: $(date)" || exit 0
          git push origin main