name: Daily Update
on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00 = 한국 오전 9시
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install
        run: pip install pandas openpyxl requests
      - name: Run
        run: python update_data.py
      - name: Push
        run: |
          git config --global user.name "bot"
          git add .
          git commit -m "오전 9시 정기 업데이트" || exit 0
          git push