name: Automated Dashboard Update
on:
  schedule:
    - cron: '0 */3 * * *' # 3시간마다 실행 (UTC 기준)
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install pandas openpyxl requests playwright
          playwright install chromium
      - name: Run Full Scraper (Events & Ranking)
        run: python backend/scraper.py
      - name: Update Diffs and History
        run: python backend/data_manager.py
      - name: Push updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated data update (3h schedule)" || exit 0
          git push