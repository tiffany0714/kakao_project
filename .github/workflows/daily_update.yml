name: Automated Ozkiz Ranking Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# 128 에러를 해결하는 핵심 설정: 저장소 쓰기 권한 부여
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas playwright openpyxl
          playwright install chromium

      - name: Run Scraper
        run: python backend/scraper.py

      - name: Push updates
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 파일이 어디에 생성되었는지 터미널 로그로 강제 확인 (디버깅용)
          find . -name "current_data.json"
          
          # 2. 모든 변경된 파일을 강제로 추가
          git add . 
          
          # 3. 변경사항이 있으면 커밋 후 푸시
          git commit -m "Automated Update: $(date)" || exit 0
          git push origin main