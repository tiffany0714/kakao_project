name: Daily Kakao Ranking Scrape

on:
  schedule:
    # 12:00 PM KST (UTC+9) is 03:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          # Install playwright browsers
          python -m playwright install chromium

      - name: Run Scraper
        run: |
          # Use the existing scraper script
          python backend/scraper.py
        env:
          # If SCRAPER_SCRIPT uses absolute paths, we might need to adjust or use relative
          PYTHONPATH: .

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data/current_data.json
          git commit -m "Auto-update rankings [$(date +'%Y-%m-%d %H:%M:%S')]" || echo "No changes to commit"
          git push
