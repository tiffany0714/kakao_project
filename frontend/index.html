<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오 선물하기 대시보드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>카카오 선물하기 대시보드</h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="update-status" class="update-status" style="font-size: 0.9rem; color: #666;">Loading...</div>
                <button id="update-btn" style="
                    padding: 6px 12px;
                    background-color: #fee500;
                    border: 1px solid #ddd;
                    border-radius: 6px;
                    cursor: pointer;
                    font-weight: bold;
                    font-size: 0.85rem;
                ">🔄 업데이트</button>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="tab1">이벤트 캘린더</button>
            <button class="tab-btn" data-tab="tab2">행사 상세내용</button>
            <button class="tab-btn" data-tab="tab3">랭킹</button>
        </nav>

        <main>
            <div id="tab1" class="tab-content active">
                <div class="calendar-controls">
                    <h2 id="current-month-display">2026년 3월</h2>
                    <div class="calendar-nav">
                        <button id="prev-month-btn" class="nav-btn">이전달</button>
                        <button id="today-btn" class="nav-btn today-btn">오늘</button>
                        <button id="next-month-btn" class="nav-btn">다음달</button>
                    </div>
                </div>
                <div class="calendar-labels">
                    <div class="day-label">일</div><div class="day-label">월</div>
                    <div class="day-label">화</div><div class="day-label">수</div>
                    <div class="day-label">목</div><div class="day-label">금</div>
                    <div class="day-label">토</div>
                </div>
                <div id="calendar-grid"></div>
            </div>

            <div id="tab2" class="tab-content">
                <div id="event-details" class="details-grid"></div>
            </div>

            <div id="tab3" class="tab-content">
                <div class="ranking-header">
                    <div class="sub-tabs-container">
                        <button class="sub-tab-btn active" data-sub="strategy">전략상품</button>
                        <button class="sub-tab-btn" data-sub="niece">조카선물</button>
                    </div>
                    <div id="strategy-filter-tabs" class="season-tabs">
                        <button class="season-tab active" data-season="전체">전체</button>
                        <button class="season-tab" data-season="사계절">사계절</button>
                        <button class="season-tab" data-season="봄/가을">봄/가을</button>
                        <button class="season-tab" data-season="여름">여름</button>
                        <button class="season-tab" data-season="겨울">겨울</button>
                    </div>
                </div>
                <div id="ranking-list"></div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
