<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao Project Dashboard</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-content">
            <h1>Kakao Dashboard</h1>
            <div id="update-status" class="update-info">데이터를 불러오는 중...</div>
        </div>
        <nav>
            <button class="tab-btn active" data-tab="tab1">행사 일정 (캘린더)</button>
            <button class="tab-btn" data-tab="tab2">행사 상세 내용</button>
            <button class="tab-btn" data-tab="tab3">랭킹</button>
        </nav>
    </header>

    <main id="app">
        <section id="change-log" class="change-log hidden">
            <h3>최근 업데이트 내용</h3>
            <ul id="change-list"></ul>
        </section>

        <section id="tab1" class="tab-content active">
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prev-month">&lt;</button>
                    <h2 id="current-month">2026년 3월</h2>
                    <button id="next-month">&gt;</button>
                </div>
                <div class="calendar-grid">
                    <div class="day-label">Sun</div>
                    <div class="day-label">Mon</div>
                    <div class="day-label">Tue</div>
                    <div class="day-label">Wed</div>
                    <div class="day-label">Thu</div>
                    <div class="day-label">Fri</div>
                    <div class="day-label">Sat</div>
                    <div id="calendar-days" class="calendar-days"></div>
                </div>
            </div>
            <div id="event-legend" class="event-legend"></div>
        </section>

        <section id="tab2" class="tab-content">
            <div id="event-details" class="details-grid"></div>
        </section>

        <section id="tab3" class="tab-content">
            <div class="ranking-container">
                <div class="ranking-header">
                    <h2 class="slide-up">랭킹 분석</h2>
                    <div class="ranking-sub-nav slide-up">
                        <button class="sub-tab-btn active" data-sub="realtime">실시간 TOP 20</button>
                        <button class="sub-tab-btn" data-sub="strategy">시즌별 전략 상품</button>
                    </div>
                    
                    <div id="strategy-filter-container" class="filter-box hidden">
                        <select id="seasonFilter">
                            <option value="전체">🌸 모든 계절 보기</option>
                            <option value="봄/가을">🌷 봄/가을</option>
                            <option value="여름">☀️ 여름</option>
                            <option value="겨울">❄️ 겨울</option>
                            <option value="사계절">📅 사계절</option>
                        </select>
                    </div>
                </div>

                <div id="ranking-list" class="ranking-list slide-up">
                    <div class="no-data">데이터를 불러오는 중...</div>
                </div>
            </div>
        </section>
    </main>

    <div id="tooltip" class="tooltip hidden"></div>

    <script src="app.js"></script>
</body>
</html>
