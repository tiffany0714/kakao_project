<html lang="ko"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao Project Dashboard</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-content">
            <h1>Kakao Dashboard</h1>
            <div id="update-status" class="update-info">마지막 업데이트: 2026. 3. 11. 오후 3:18:41</div>
        </div>
        <nav>
            <button class="tab-btn active" data-tab="tab1">행사 일정 (캘린더)</button>
            <button class="tab-btn" data-tab="tab2">행사 상세 내용</button>
            <button class="tab-btn" data-tab="tab3">랭킹</button>
        </nav>
    </header>

    <main id="app">
        <!-- Dashboard Change Log (hidden if no changes) -->
        <section id="change-log" class="change-log hidden">
            <h3>최근 업데이트 내용</h3>
            <ul id="change-list"></ul>
        </section>

        <!-- Tab 1: Event Calendar -->
        <section id="tab1" class="tab-content active">
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prev-month">&lt;</button>
                    <h2 id="current-month">2026년 3월</h2>
                    <button id="next-month">&gt;</button>
                </div>
                <div class="calendar-grid">
                    <div class="day-label">Sun</div>
                    <div class="day-label">Mon</div>
                    <div class="day-label">Tue</div>
                    <div class="day-label">Wed</div>
                    <div class="day-label">Thu</div>
                    <div class="day-label">Fri</div>
                    <div class="day-label">Sat</div>
                    <div id="calendar-days" class="calendar-days"></div>
                </div>
            </div>
            <div id="event-legend" class="event-legend"></div>
        </section>

        <!-- Tab 2: Detailed Info -->
        <section id="tab2" class="tab-content">
            <div id="event-details" class="details-grid"></div>
        </section>

        <!-- Tab 3: Kakao Ranking -->
        <section id="tab3" class="tab-content">
            <div class="ranking-container">
                <div class="ranking-header">
                    <h2 class="slide-up">랭킹</h2>
                    <div class="ranking-sub-nav slide-up">
                        <button class="sub-tab-btn active" data-sub="realtime">실시간 랭킹</button>
                        <button class="sub-tab-btn" data-sub="niece">조카 선물</button>
                    </div>
                </div>
                <div id="ranking-list" class="ranking-list slide-up">
                    <div class="no-data">랭킹 정보를 불러오는 중...</div>
                </div>
            </div>
        </section>
    </main>

    <!-- Tooltip Element -->
    <div id="tooltip" class="tooltip hidden"></div>

    <script src="app.js"></script>

</body></html>
